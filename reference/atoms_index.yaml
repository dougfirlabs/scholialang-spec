# Scholia v0.5 atom index — single source of truth for the notation
# reference doc. ``scripts/notation_reference_gen.py`` reads this file
# and emits ``reference/notation-reference.md``. The atom set, names,
# and attribute lists must match ``scholialang/src/scholialang/atoms.py``
# — the consistency test ``tests/test_spec_consistency.py`` enforces it.
#
# Schema (per atom entry):
#   kind:          required, PascalCase; matches an entry in _ATOM_CLASSES.
#   category:      one of Reasoning, Evidence, Control, Reference,
#                  Social, Meta, Primitives.
#   semantic:      one-line natural-language summary.
#   attributes:    list of {name, type, required (bool), notes}.
#                  Wire attribute names (``for``, ``as``) are used
#                  here, not the Python field names (``for_ref``,
#                  ``as_var``).
#   body:          one of "free-text" / "free-text + nested atoms" /
#                  "empty" / "structured (see notes)".
#   example:       XML snippet.
#   applies_rules: validator rule names from §4 of the canonical spec.

version: "0.5"
spec: "SCHOLIA_v0.5_SPEC.md"
generated_by_hand: true
total_atoms: 32

atoms:

  # ── §2.1 Reasoning ──────────────────────────────────────────────────

  - kind: Action
    category: Reasoning
    semantic: external state change — must produce a Finding.
    attributes:
      - { name: id,        type: string,    required: false, notes: "trace-scoped identifier." }
      - { name: timestamp, type: ISO-8601,  required: false, notes: "wall-clock at action time." }
    body: "free-text + nested atoms"
    example: |
      <Action id="A_01" timestamp="2026-06-04T12:00:00-07:00">
        Edited <code>src/foo.py</code> to add new helper.
        <Finding id="F_01">Helper compiles.</Finding>
      </Action>
    applies_rules: [Action-recorded, Constraint-respected]

  - kind: Observation
    category: Reasoning
    semantic: external input — command output, file contents, query result.
    attributes:
      - { name: id,         type: string,   required: false, notes: "trace-scoped identifier." }
      - { name: timestamp,  type: ISO-8601, required: false, notes: "wall-clock at observation." }
      - { name: location,   type: "file:start:end", required: false, notes: "code-graph anchor." }
      - { name: confidence, type: "float | low | medium | high", required: false, notes: "epistemic strength of this observation." }
    body: "free-text + nested atoms"
    example: |
      <Observation id="Obs_01" timestamp="2026-06-04T12:01:00-07:00" location="src/foo.py:42:58" confidence="0.9">
        Tests pass for module ``foo``.
      </Observation>
    applies_rules: [Reference-complete, Observation-locatable, Confidence-bounded]

  - kind: Thinking
    category: Reasoning
    semantic: internal deliberation — not observing, not acting.
    attributes:
      - { name: id, type: string, required: false, notes: "trace-scoped identifier." }
    body: "free-text + nested atoms (Storing, Print, Hypothesis, etc.)"
    example: |
      <Thinking id="T_01">
        REFER:Obs_01. If tests pass, IMPLIES:F_01 holds.
        <Hypothesis id="H_01">Coverage is adequate.</Hypothesis>
      </Thinking>
    applies_rules: []

  # ── §2.2 Evidence ───────────────────────────────────────────────────

  - kind: Concluding
    category: Evidence
    semantic: chain-level epistemic close — resolves a Goal via cited atoms.
    attributes:
      - { name: id,          type: string,                                                                  required: false, notes: "trace-scoped identifier." }
      - { name: for_goal,    type: string,                                                                  required: true,  notes: "id of the Goal this Concluding closes." }
      - { name: confidence,  type: "float [0,1]",                                                           required: false, notes: "declared epistemic strength of the close." }
      - { name: criticality, type: "incidental | bridge | ledger | verifier | kernel",                      required: false, notes: "declared closure-tier; defaults to max(cited findings' criticality)." }
    body: "free-text containing one or more REFER: operators."
    example: |
      <Concluding id="C_01" for_goal="G_01" confidence="0.85" criticality="ledger">
        REFER:F_01 AND REFER:F_02 IMPLIES the migration is complete.
      </Concluding>
    applies_rules: [for_goal_resolves, refer_at_least_one, criticality_non_decreasing, no_action_in_concluding, single_active_concluding_per_goal, min_confidence_ceiling, "Goal-declared"]

  - kind: Contradiction
    category: Evidence
    semantic: two claims that cannot both be true; forces a Deciding.
    attributes:
      - { name: id, type: string, required: false, notes: "trace-scoped identifier." }
    body: "free-text + REFER: operators naming the contradicting atoms."
    example: |
      <Contradiction id="K_01">
        REFER:F_03 AND NOT REFER:F_03 — two prior Findings disagree on coverage.
      </Contradiction>
    applies_rules: []

  - kind: Evidence
    category: Evidence
    semantic: observation bearing on a Hypothesis (supports / refutes / neutral).
    attributes:
      - { name: id,       type: string,                          required: false, notes: "trace-scoped identifier." }
      - { name: for,      type: string,                          required: true,  notes: "id of the Hypothesis this Evidence bears on (Python field: for_ref)." }
      - { name: polarity, type: "supports | refutes | neutral",  required: true,  notes: "direction of bearing." }
    body: "free-text"
    example: |
      <Evidence id="E_01" for="H_01" polarity="supports">
        merge-tree produced no conflicts.
      </Evidence>
    applies_rules: ["Hypothesis-evaluated"]

  - kind: Finding
    category: Evidence
    semantic: conclusion drawn from evidence — evaluates a Hypothesis.
    attributes:
      - { name: id,       type: string,                                                       required: false, notes: "trace-scoped identifier." }
      - { name: for_hyp,  type: string,                                                       required: false, notes: "id of the Hypothesis this Finding evaluates (v0.5 canonical)." }
      - { name: for_goal, type: string,                                                       required: false, notes: "DEPRECATED in v0.5 — use for_hyp. Preserved through v0.6." }
      - { name: status,   type: "met | unmet | partially_met | met_late",                     required: false, notes: "closure status when closing a required Goal." }
    body: "free-text"
    example: |
      <Finding id="F_01" for_hyp="H_01" status="met">All criteria passed.</Finding>
    applies_rules: ["Action-recorded", "Goal-declared"]

  - kind: Hypothesis
    category: Evidence
    semantic: explicit conjecture the agent intends to test.
    attributes:
      - { name: id, type: string, required: false, notes: "trace-scoped identifier." }
    body: "free-text"
    example: |
      <Hypothesis id="H_01">All tests pass under --timeout=10.</Hypothesis>
    applies_rules: ["Hypothesis-evaluated"]

  - kind: Retract
    category: Evidence
    semantic: revoke a prior Finding (or downgrade-bypass for criticality).
    attributes:
      - { name: id,          type: string, required: false, notes: "trace-scoped identifier." }
      - { name: target,      type: string, required: true,  notes: "id of the Finding/Concluding/Goal being retracted." }
      - { name: reason,      type: string, required: false, notes: "short rationale for the retraction." }
      - { name: replacement, type: string, required: false, notes: "id of the replacing atom if any." }
    body: "free-text"
    example: |
      <Retract id="R_01" target="G_01" reason="criticality reclassified to bridge after triage.">
        Goal G_01 moved off the kernel tier.
      </Retract>
    applies_rules: ["Retract-consistent"]

  - kind: Uncertainty
    category: Evidence
    semantic: confidence below 1 attached to a Finding, Hypothesis, or Evidence.
    attributes:
      - { name: id,         type: string,                       required: false, notes: "trace-scoped identifier." }
      - { name: on,         type: string,                       required: false, notes: "id of the atom this Uncertainty annotates." }
      - { name: confidence, type: "float [0,1] | low | medium | high", required: false, notes: "qualitative or numeric." }
    body: "free-text rationale"
    example: |
      <Uncertainty id="U_01" on="F_02" confidence="0.4">
        Coverage signal is weak — only 3 traces sampled.
      </Uncertainty>
    applies_rules: ["Confidence-bounded"]

  # ── §2.3 Control ───────────────────────────────────────────────────

  - kind: Alternative
    category: Control
    semantic: explicitly rejected option inside a Deciding.
    attributes:
      - { name: id,               type: string, required: false, notes: "trace-scoped identifier." }
      - { name: label,            type: string, required: true,  notes: "short label for the alternative." }
      - { name: rejected_because, type: string, required: true,  notes: "why this option was not chosen." }
    body: "free-text"
    example: |
      <Alternative id="Alt_01" label="rebase" rejected_because="lossy history">
        Rebase would flatten the commit chain.
      </Alternative>
    applies_rules: []

  - kind: Branch
    category: Control
    semantic: legal transition out of a Deciding.
    attributes:
      - { name: id,    type: string, required: false, notes: "trace-scoped identifier." }
      - { name: of,    type: string, required: true,  notes: "id of the parent Deciding." }
      - { name: label, type: string, required: true,  notes: "the chosen branch label." }
    body: "free-text + further atoms following the branch."
    example: |
      <Branch id="Br_01" of="D_01" label="merge">
        Merge keeps both histories visible.
      </Branch>
    applies_rules: []

  - kind: Deciding
    category: Control
    semantic: action commitment branch point — chooses among alternatives.
    attributes:
      - { name: id,      type: string,        required: false, notes: "trace-scoped identifier." }
      - { name: options, type: comma-list,    required: false, notes: "labels of available options; long-form Alternative atoms are also accepted." }
    body: "free-text + Alternative children + Finding child declaring the chosen branch."
    example: |
      <Deciding id="D_01" options="merge,rebase,squash">
        <Alternative label="rebase" rejected_because="lossy history"/>
        <Finding for_hyp="H_choice" status="met">Chose merge.</Finding>
      </Deciding>
    applies_rules: ["Decision-closed"]

  - kind: Loop
    category: Control
    semantic: iteration over a collection — binds one per-iteration variable.
    attributes:
      - { name: id,   type: string, required: false, notes: "trace-scoped identifier." }
      - { name: over, type: string, required: true,  notes: "the collection being iterated." }
      - { name: as,   type: string, required: true,  notes: "Python field: as_var; per-iteration variable name." }
    body: "free-text + nested atoms — typically one or more Observation atoms per iteration."
    example: |
      <Loop id="L_01" over="tests" as="test">
        REFER:test — iterate over each test in the suite.
      </Loop>
    applies_rules: []

  - kind: Parallel
    category: Control
    semantic: concurrent independent atoms with no specified ordering.
    attributes:
      - { name: id, type: string, required: false, notes: "trace-scoped identifier." }
    body: "free-text + nested atoms that must not depend on sibling order."
    example: |
      <Parallel id="P_01">
        <Observation id="Obs_a">checkout A</Observation>
        <Observation id="Obs_b">checkout B</Observation>
      </Parallel>
    applies_rules: []

  # ── §2.4 Reference ─────────────────────────────────────────────────

  - kind: Implication
    category: Reference
    semantic: long-form forward-link — equivalent to inline IMPLIES:id.
    attributes:
      - { name: id,   type: string, required: false, notes: "trace-scoped identifier." }
      - { name: next, type: string, required: true,  notes: "id of the implied atom." }
    body: "free-text rationale (optional)."
    example: |
      <Implication id="Imp_01" next="F_02">
        REFER:Obs_01 IMPLIES the next finding is met.
      </Implication>
    applies_rules: []

  - kind: Print
    category: Reference
    semantic: one-line human-facing summary surfaced to the reader.
    attributes:
      - { name: id, type: string, required: false, notes: "trace-scoped identifier." }
    body: "single-line text"
    example: |
      <Print id="Pr_01">Migration complete on branch feat/foo.</Print>
    applies_rules: []

  - kind: Reference
    category: Reference
    semantic: long-form back-link — equivalent to inline REFER:id.
    attributes:
      - { name: id, type: string, required: false, notes: "trace-scoped identifier." }
      - { name: to, type: string, required: true,  notes: "id of the referenced atom." }
    body: "free-text rationale (optional)."
    example: |
      <Reference id="Ref_01" to="F_01">See prior Finding F_01.</Reference>
    applies_rules: [Reference-complete]

  - kind: Storing
    category: Reference
    semantic: persist a named value to trace-local memory for later REFER.
    attributes:
      - { name: id,    type: string, required: false, notes: "trace-scoped identifier." }
      - { name: name,  type: string, required: true,  notes: "key for later REFER:name." }
      - { name: value, type: string, required: true,  notes: "stored value." }
    body: "empty"
    example: |
      <Storing id="S_01" name="branch_head" value="abc123de"/>
    applies_rules: []

  # ── §2.5 Social ────────────────────────────────────────────────────

  - kind: Handoff
    category: Social
    semantic: pass work to another agent with a named package.
    attributes:
      - { name: id,          type: string,     required: false, notes: "trace-scoped identifier." }
      - { name: to,          type: string,     required: true,  notes: "receiving agent name." }
      - { name: package,     type: string,     required: false, notes: "named subset of state being passed." }
      - { name: constraints, type: comma-list, required: false, notes: "constraints that survive the handoff." }
    body: "free-text — what is being handed off and why."
    example: |
      <Handoff id="Ho_01" to="reviewer" package="merge_request" constraints="no_force_push">
        Passing merge to reviewer.
      </Handoff>
    applies_rules: []

  - kind: Question
    category: Social
    semantic: explicit request for external input.
    attributes:
      - { name: id,      type: string, required: false, notes: "trace-scoped identifier." }
      - { name: to,      type: string, required: true,  notes: "target of the question (e.g. operator)." }
      - { name: scope,   type: string, required: false, notes: "what scope the answer affects." }
      - { name: default, type: string, required: false, notes: "default if no answer arrives." }
    body: "free-text — the question itself."
    example: |
      <Question id="Q_01" to="operator" scope="merge_strategy" default="merge">
        Merge, rebase, or squash?
      </Question>
    applies_rules: []

  - kind: Review
    category: Social
    semantic: audit another agent's atom and produce a Finding.
    attributes:
      - { name: id,       type: string, required: false, notes: "trace-scoped identifier." }
      - { name: of,       type: string, required: true,  notes: "id (or trace_id:atom_id) of the atom being reviewed." }
      - { name: reviewer, type: string, required: false, notes: "name of the reviewing agent." }
    body: "free-text + a Finding child declaring the review outcome."
    example: |
      <Review id="Rv_01" of="F_07" reviewer="auditor">
        <Finding for_hyp="H_review" status="met">Approve.</Finding>
      </Review>
    applies_rules: []

  # ── §2.6 Meta ──────────────────────────────────────────────────────

  - kind: Budget
    category: Meta
    semantic: declared spending envelope (tokens / actions / wall_clock_ms).
    attributes:
      - { name: id,            type: string, required: false, notes: "trace-scoped identifier." }
      - { name: for,           type: string, required: false, notes: "id of the atom this budget governs (Python field: for_ref)." }
      - { name: tokens,        type: int,    required: false, notes: "token ceiling." }
      - { name: actions,       type: int,    required: false, notes: "action-count ceiling." }
      - { name: wall_clock_ms, type: int,    required: false, notes: "wall-clock ceiling in ms." }
    body: "free-text rationale (optional)."
    example: |
      <Budget id="Bg_01" for="G_01" tokens="50000" wall_clock_ms="600000"/>
    applies_rules: []

  - kind: Confidence
    category: Meta
    semantic: qualitative or numeric confidence attached to another atom.
    attributes:
      - { name: id,    type: string,                              required: false, notes: "trace-scoped identifier." }
      - { name: on,    type: string,                              required: false, notes: "id of the atom this Confidence annotates." }
      - { name: level, type: "float [0,1] | low | medium | high", required: false, notes: "qualitative or numeric strength." }
      - { name: basis, type: string,                              required: false, notes: "short rationale for the level." }
    body: "free-text (optional)."
    example: |
      <Confidence id="Cf_01" on="F_02" level="0.85" basis="3 corroborating Observations"/>
    applies_rules: ["Confidence-bounded"]

  - kind: Constraint
    category: Meta
    semantic: hard rule in effect that subsequent decisions must respect.
    attributes:
      - { name: id,    type: string, required: false, notes: "trace-scoped identifier." }
      - { name: scope, type: string, required: false, notes: "what scope the constraint applies to." }
    body: "free-text — the constraint itself."
    example: |
      <Constraint id="Cn_01" scope="trace">No force-push to main.</Constraint>
    applies_rules: ["Constraint-respected"]

  - kind: Cost
    category: Meta
    semantic: observed expenditure (tokens / dollars / wall_clock_ms).
    attributes:
      - { name: id,            type: string, required: false, notes: "trace-scoped identifier." }
      - { name: for,           type: string, required: false, notes: "id of the atom this cost is attributed to (Python field: for_ref)." }
      - { name: tokens,        type: int,    required: false, notes: "tokens spent." }
      - { name: wall_clock_ms, type: int,    required: false, notes: "wall-clock spent in ms." }
      - { name: dollars,       type: float,  required: false, notes: "dollars spent." }
    body: "free-text rationale (optional)."
    example: |
      <Cost id="Co_01" for="G_01" tokens="42000" dollars="0.21"/>
    applies_rules: []

  - kind: EventRef
    category: Meta
    semantic: pointer to an externally recorded run event.
    attributes:
      - { name: id,         type: string,   required: false, notes: "trace-scoped identifier." }
      - { name: instance,   type: string,   required: false, notes: "external system instance name." }
      - { name: run_id,     type: string,   required: false, notes: "external run id." }
      - { name: sequence,   type: int,      required: false, notes: "event sequence number." }
      - { name: for,        type: string,   required: false, notes: "id of the related local atom (Python field: for_ref)." }
      - { name: wall_clock, type: ISO-8601, required: false, notes: "wall-clock of the event." }
    body: "empty"
    example: |
      <EventRef id="Ev_01" instance="dashboard" run_id="abc123" sequence="42" wall_clock="2026-06-04T12:00:00Z"/>
    applies_rules: []

  - kind: Goal
    category: Meta
    semantic: target proposition the agent is pursuing — may declare criticality.
    attributes:
      - { name: id,                  type: string,                                                            required: false, notes: "trace-scoped identifier." }
      - { name: scope,               type: string,                                                            required: false, notes: "what scope the Goal applies to." }
      - { name: priority,            type: "required | optional",                                             required: false, notes: "required Goals must be closed by a Finding/Concluding." }
      - { name: success_criteria,    type: comma-list,                                                        required: false, notes: "what counts as met." }
      - { name: related_constraints, type: comma-list,                                                        required: false, notes: "ids of related Constraints." }
      - { name: deadline,            type: ISO-8601,                                                          required: false, notes: "wall-clock target." }
      - { name: failure_modes,       type: comma-list,                                                        required: false, notes: "named ways the Goal can fail." }
      - { name: criticality,         type: "incidental | bridge | ledger | verifier | kernel",                required: false, notes: "risk tier — feeds criticality_non_decreasing." }
    body: "free-text — the Goal proposition."
    example: |
      <Goal id="G_01" scope="trace" priority="required" criticality="ledger" deadline="2026-06-05T00:00:00Z">
        Migrate Finding for_goal callers to for_hyp.
      </Goal>
    applies_rules: ["Goal-declared", criticality_non_decreasing]

  # ── §2.7 Primitives (v0.3.1 schema-reserved) ───────────────────────

  - kind: Edge
    category: Primitives
    semantic: schema-reserved import / dependency edge on an Observation.
    attributes:
      - { name: id,     type: string,                                          required: false, notes: "trace-scoped identifier." }
      - { name: type,   type: "imports | depends | calls | tests | publishes", required: false, notes: "edge kind (Python field: edge_type)." }
      - { name: target, type: string,                                          required: false, notes: "target symbol / file / atom id." }
    body: "free-text (optional)."
    example: |
      <Edge id="Ed_01" type="imports" target="numpy"/>
    applies_rules: []

  - kind: Effect
    category: Primitives
    semantic: schema-reserved side-effect kind (io_write / network / subprocess / mutates_state / pure).
    attributes:
      - { name: id,   type: string,                                                                 required: false, notes: "trace-scoped identifier." }
      - { name: kind, type: "io_write | network | subprocess | mutates_state | pure",               required: false, notes: "effect classification (Python field: effect_kind)." }
    body: "free-text (optional)."
    example: |
      <Effect id="Ef_01" kind="io_write"/>
    applies_rules: ["Effect-classified"]

  - kind: Meta
    category: Primitives
    semantic: schema-reserved Step-level metadata (e.g. criticality).
    attributes:
      - { name: id,          type: string,                                                                  required: false, notes: "trace-scoped identifier." }
      - { name: criticality, type: "incidental | bridge | ledger | verifier | kernel",                      required: false, notes: "Step-level risk tier." }
    body: "free-text or the parser-recognized ``<Meta:research-mode/>`` pseudo-atom form."
    example: |
      <Meta id="M_01" criticality="kernel"/>
    applies_rules: []

  - kind: Ref
    category: Primitives
    semantic: schema-reserved generic reference sub-element with type / target.
    attributes:
      - { name: id,     type: string,                       required: false, notes: "trace-scoped identifier." }
      - { name: type,   type: "test_owner | doc | spec",    required: false, notes: "reference kind (Python field: ref_type)." }
      - { name: target, type: string,                       required: false, notes: "target id or path." }
    body: "free-text (optional)."
    example: |
      <Ref id="Rf_01" type="test_owner" target="tests/unit/foo/test_bar.py"/>
    applies_rules: []
